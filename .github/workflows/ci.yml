name: CI

on:
  pull_request:
  push:
    branches:
      - '**'

jobs:
  docs:
    name: Docs Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Markdown links and images
        run: python3 scripts/validate_docs.py

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch REAPER SDK headers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p lib/reaper-sdk
          curl -fsSL "https://www.reaper.fm/sdk/plugin/reaper_plugin.h" -o "lib/reaper-sdk/reaper_plugin.h"
          curl -fsSL "https://www.reaper.fm/sdk/plugin/reaper_plugin_functions.h" -o "lib/reaper-sdk/reaper_plugin_functions.h"
          grep -q "REAPER_PLUGIN_ENTRYPOINT" "lib/reaper-sdk/reaper_plugin.h"
          grep -q "REAPERAPI_LoadAPI" "lib/reaper-sdk/reaper_plugin_functions.h"

      - name: Fetch oscpack sources
        shell: bash
        run: |
          set -euo pipefail
          rm -rf lib/oscpack
          git clone --depth 1 https://github.com/RossBencina/oscpack.git lib/oscpack
          test -f "lib/oscpack/osc/OscOutboundPacketStream.h"

      - name: Configure (CMake)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: bash
        run: |
          set +e
          cmake --build build --config Release -j 4 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            tail_text="$(tail -n 80 build.log)"
            tail_text="${tail_text//'%'/'%25'}"
            tail_text="${tail_text//$'\n'/'%0A'}"
            tail_text="${tail_text//$'\r'/'%0D'}"
            echo "::error title=Build failed::${tail_text}"
            exit "$status"
          fi

      - name: Stage install
        run: cmake --install build --config Release --prefix stage

      - name: Validate Windows plugin binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./packaging/validate_windows_binary.ps1 -PluginPath stage/reaper_wingconnector.dll

      - name: Validate Windows UI layout scaling
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cmake -S . -B build-ui-tests -DBUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build-ui-tests --config Release --target windows_ui_layout_tests -j 4
          ctest --test-dir build-ui-tests -C Release -R '^windows_ui_layout_tests$' --output-on-failure

      - name: Upload staged artifact
        uses: actions/upload-artifact@v4
        with:
          name: audiolab-wing-reaper-virtualsoundcheck-${{ matrix.os }}-stage
          path: stage/
          if-no-files-found: error
